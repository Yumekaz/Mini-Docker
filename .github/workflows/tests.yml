name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

#      - name: Cache pip dependencies
#        uses: actions/cache@v4
#        with:
#          path: ~/.cache/pip
#          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
#          restore-keys: |
#            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if ! pip install -e ".[dev]" > pip_error.log 2>&1; then
            python -c "import sys; print('::error file=.github,line=1::' + sys.stdin.read()[-3000:].replace('\n', '%0A'))" < pip_error.log
            cat pip_error.log
            exit 1
          fi

      - name: Run tests
        run: |
          pytest -v --cov=mini_docker --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.10'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Quick sanity check that the package imports correctly
  import-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Test import
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -c "import mini_docker; print(f'Version: {mini_docker.__version__}')"
